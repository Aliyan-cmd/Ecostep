global:
  scrape_interval: 15s      # Pull metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate alert conditions every 15 seconds

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'ecostep-fastapi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
