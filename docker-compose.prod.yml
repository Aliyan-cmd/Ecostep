version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      # Mount the secure nginx proxy configuration directly over the container's default
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - webnet

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8000"
    environment:
      # Isolate the cache and database routing to the internal network
      - REDIS_URL=redis://redis_cache:6379
      - DB_URL=postgresql://user:password@cloudsql:5432/ecostep
      # The KMS injected Key Encryption Key (simulated here)
      - ECOSTEP_DEK=${ECOSTEP_DEK:-mock_b64_key_string}
    depends_on:
      - redis_cache
    networks:
      - webnet
      - internalnet

  redis_cache:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - internalnet
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

networks:
  webnet:
    driver: bridge
  internalnet:
    driver: bridge
    internal: true # Strict internal segmentation from the DMZ edge proxy

volumes:
  redis_data:
